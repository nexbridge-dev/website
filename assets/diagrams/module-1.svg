<svg viewBox="0 0 500 170" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto">
            <!-- Step 1: JPY Deposit -->
            <g transform="translate(55,48)">
              <rect x="-42" y="0" width="84" height="54" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
              <text x="0" y="26" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="19" font-family="Inter" font-weight="700">¥</text>
              <text x="0" y="42" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="8" font-family="Inter" font-weight="600">JPY Deposit</text>
              <text x="0" y="72" text-anchor="middle" fill="rgba(255,255,255,0.22)" font-size="7" font-family="Inter">Fiat Input</text>
            </g>
            <!-- Arrow 1 -->
            <line x1="100" y1="75" x2="147" y2="75" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
            <polygon points="147,72 153,75 147,78" fill="rgba(255,255,255,0.2)"/>
            <circle r="2.5" fill="rgba(255,255,255,0.5)">
              <animate attributeName="cx" values="100;147" dur="1.8s" repeatCount="indefinite"/>
              <animate attributeName="cy" values="75;75" dur="1.8s" repeatCount="indefinite"/>
              <animate attributeName="opacity" values="0;1;1;0" dur="1.8s" repeatCount="indefinite"/>
            </circle>
            <!-- Step 2: Trust Bank -->
            <g transform="translate(195,48)">
              <rect x="-42" y="0" width="84" height="54" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
              <!-- Refined bank icon: pediment + 4 columns + base -->
              <g stroke="rgba(255,255,255,0.6)" fill="none" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round">
                <!-- Pediment (triangular roof) -->
                <path d="M-12,18 L0,11 L12,18 Z" fill="rgba(255,255,255,0.08)"/>
                <!-- Architrave -->
                <line x1="-13" y1="20" x2="13" y2="20"/>
                <!-- 4 columns -->
                <line x1="-9" y1="22" x2="-9" y2="30"/>
                <line x1="-3" y1="22" x2="-3" y2="30"/>
                <line x1="3" y1="22" x2="3" y2="30"/>
                <line x1="9" y1="22" x2="9" y2="30"/>
                <!-- Base -->
                <line x1="-12" y1="31.5" x2="12" y2="31.5"/>
              </g>
              <text x="0" y="44" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="8" font-family="Inter" font-weight="600">Trust Bank</text>
              <text x="0" y="72" text-anchor="middle" fill="rgba(255,255,255,0.22)" font-size="7" font-family="Inter">Reserve Lock</text>
            </g>
            <!-- Arrow 2 -->
            <line x1="240" y1="75" x2="287" y2="75" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
            <polygon points="287,72 293,75 287,78" fill="rgba(255,255,255,0.2)"/>
            <circle r="2.5" fill="rgba(255,255,255,0.5)">
              <animate attributeName="cx" values="240;287" dur="1.8s" repeatCount="indefinite" begin="0.6s"/>
              <animate attributeName="cy" values="75;75" dur="1.8s" repeatCount="indefinite" begin="0.6s"/>
              <animate attributeName="opacity" values="0;1;1;0" dur="1.8s" repeatCount="indefinite" begin="0.6s"/>
            </circle>
            <!-- Step 3: Mint Contract -->
            <g transform="translate(335,48)">
              <rect x="-42" y="0" width="84" height="54" rx="10" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
              <!-- Document with code/lines -->
              <g stroke="rgba(255,255,255,0.55)" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <path d="M-10,13 L6,13 L12,19 L12,31 L-10,31 Z" fill="rgba(255,255,255,0.05)" stroke-width="1.1"/>
                <path d="M6,13 L6,19 L12,19" stroke-width="1.1"/>
                <line x1="-6" y1="22" x2="6" y2="22" stroke-width="0.8" stroke="rgba(255,255,255,0.35)"/>
                <line x1="-6" y1="25.5" x2="3" y2="25.5" stroke-width="0.8" stroke="rgba(255,255,255,0.25)"/>
                <line x1="-6" y1="29" x2="6" y2="29" stroke-width="0.8" stroke="rgba(255,255,255,0.35)"/>
              </g>
              <text x="0" y="44" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="8" font-family="Inter" font-weight="600">Mint Contract</text>
              <text x="0" y="72" text-anchor="middle" fill="rgba(255,255,255,0.22)" font-size="7" font-family="Inter">ERC-20 Deploy</text>
            </g>
            <!-- Arrow 3 -->
            <line x1="380" y1="75" x2="423" y2="75" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
            <polygon points="423,72 429,75 423,78" fill="rgba(255,255,255,0.2)"/>
            <circle r="2.5" fill="rgba(255,255,255,0.5)">
              <animate attributeName="cx" values="380;423" dur="1.8s" repeatCount="indefinite" begin="1.2s"/>
              <animate attributeName="cy" values="75;75" dur="1.8s" repeatCount="indefinite" begin="1.2s"/>
              <animate attributeName="opacity" values="0;1;1;0" dur="1.8s" repeatCount="indefinite" begin="1.2s"/>
            </circle>
            <!-- Step 4: SC Token (circle) -->
            <g transform="translate(455,48)">
              <circle cx="0" cy="27" r="24" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
              <text x="0" y="24" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="13" font-weight="800" font-family="Inter">SC</text>
              <text x="0" y="36" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="7" font-family="Inter">JPYC</text>
              <circle cx="0" cy="27" r="22" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.5" stroke-dasharray="3 3">
                <animateTransform attributeName="transform" type="rotate" values="0;360" dur="20s" repeatCount="indefinite"/>
              </circle>
              <text x="0" y="72" text-anchor="middle" fill="rgba(255,255,255,0.2)" font-size="7" font-family="Inter">Live Token</text>
            </g>
          </svg>