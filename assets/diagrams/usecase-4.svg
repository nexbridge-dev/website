<svg viewBox="0 0 400 140" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto">
            <!-- Central globe -->
            <g transform="translate(200,70)">
              <!-- Globe outer ring -->
              <circle cx="0" cy="0" r="40" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
              <!-- Horizontal ellipse (equator) -->
              <ellipse cx="0" cy="0" rx="40" ry="12" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="0.6"/>
              <!-- Vertical meridian -->
              <ellipse cx="0" cy="0" rx="14" ry="40" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="0.6"/>
              <!-- Rotating orbital ring -->
              <ellipse cx="0" cy="0" rx="40" ry="20" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.8" stroke-dasharray="4 3">
                <animateTransform attributeName="transform" type="rotate" values="0;360" dur="20s" repeatCount="indefinite"/>
              </ellipse>
              <!-- Center label -->
              <text x="0" y="2" text-anchor="middle" dominant-baseline="central" fill="rgba(255,255,255,0.5)" font-size="8" font-family="Inter" font-weight="600">NexBridge</text>
            </g>
            <!-- JPY endpoint (left) -->
            <g transform="translate(50,70)">
              <rect x="-36" y="-22" width="72" height="44" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
              <text x="0" y="2" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="17" font-family="Inter" font-weight="700">¥</text>
              <text x="0" y="14" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="7" font-family="Inter" font-weight="600" letter-spacing="1">JPY</text>
            </g>
            <!-- USD endpoint (right) -->
            <g transform="translate(350,70)">
              <rect x="-36" y="-22" width="72" height="44" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
              <text x="0" y="2" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="17" font-family="Inter" font-weight="700">$</text>
              <text x="0" y="14" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="7" font-family="Inter" font-weight="600" letter-spacing="1">USD</text>
            </g>
            <!-- Curved path JPY→Globe (top arc) -->
            <path id="xborderPath1" d="M86,70 Q123,30 160,70" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1" stroke-dasharray="3 3"/>
            <!-- Animated dot along top arc -->
            <circle r="3" fill="rgba(255,255,255,0.6)">
              <animateMotion dur="2.5s" repeatCount="indefinite">
                <mpath href="#xborderPath1"/>
              </animateMotion>
              <animate attributeName="opacity" values="0;0.8;0" dur="2.5s" repeatCount="indefinite"/>
            </circle>
            <!-- Curved path Globe→USD (bottom arc) -->
            <path id="xborderPath2" d="M240,70 Q277,110 314,70" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1" stroke-dasharray="3 3"/>
            <!-- Animated dot along bottom arc -->
            <circle r="3" fill="rgba(255,255,255,0.6)">
              <animateMotion dur="2.5s" repeatCount="indefinite" begin="1s">
                <mpath href="#xborderPath2"/>
              </animateMotion>
              <animate attributeName="opacity" values="0;0.8;0" dur="2.5s" repeatCount="indefinite" begin="1s"/>
            </circle>
            <!-- Time indicator -->
            <g transform="translate(200,130)">
              <text x="0" y="0" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="8" font-family="Inter" font-weight="600">SWIFT: 2-5 days</text>
              <line x1="-40" y1="-6" x2="40" y2="-6" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
            </g>
            <g transform="translate(200,16)">
              <text x="0" y="0" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="9" font-family="Inter" font-weight="700">On-Chain: ~30 sec</text>
              <rect x="-50" y="-8" width="100" height="14" rx="3" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="0.8">
                <animate attributeName="stroke-opacity" values="0.15;0.35;0.15" dur="2s" repeatCount="indefinite"/>
              </rect>
            </g>
          </svg>