<svg viewBox="0 0 400 140" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto">
            <!-- Left side: Physical Assets (stacked cards) -->
            <g transform="translate(100,70)">
              <!-- Card stack (3 offset rectangles) -->
              <rect x="-42" y="-28" width="84" height="56" rx="4" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.1)" stroke-width="0.6" transform="translate(6,6)"/>
              <rect x="-42" y="-28" width="84" height="56" rx="4" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.12)" stroke-width="0.6" transform="translate(3,3)"/>
              <rect x="-42" y="-28" width="84" height="56" rx="4" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
              <!-- Asset lines -->
              <text x="0" y="-14" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="8" font-family="Inter" font-weight="700">Real-World Assets</text>
              <line x1="-30" y1="-6" x2="30" y2="-6" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
              <!-- Mini items -->
              <text x="-24" y="4" fill="rgba(255,255,255,0.35)" font-size="7" font-family="Inter">Gov. Bonds</text>
              <text x="-24" y="14" fill="rgba(255,255,255,0.35)" font-size="7" font-family="Inter">ETFs</text>
              <text x="-24" y="24" fill="rgba(255,255,255,0.35)" font-size="7" font-family="Inter">Funds</text>
              <!-- Dots -->
              <circle cx="28" cy="1" r="2" fill="rgba(255,255,255,0.15)"/>
              <circle cx="28" cy="11" r="2" fill="rgba(255,255,255,0.15)"/>
              <circle cx="28" cy="21" r="2" fill="rgba(255,255,255,0.15)"/>
            </g>
            <!-- Center transformation zone -->
            <g transform="translate(200,70)">
              <!-- Spinning hexagon -->
              <polygon points="0,-18 16,-9 16,9 0,18 -16,9 -16,-9" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.25)" stroke-width="1.2">
                <animateTransform attributeName="transform" type="rotate" values="0;60;60;120;120;180;180;240;240;300;300;360" dur="12s" repeatCount="indefinite"/>
              </polygon>
              <polygon points="0,-12 10,-6 10,6 0,12 -10,6 -10,-6" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.6">
                <animateTransform attributeName="transform" type="rotate" values="360;0" dur="8s" repeatCount="indefinite"/>
              </polygon>
              <!-- Center icon -->
              <text x="0" y="3" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10">&#x26D3;</text>
            </g>
            <!-- Particles flying from left to center -->
            <circle r="2" fill="rgba(255,255,255,0.4)">
              <animate attributeName="cx" values="142;185" dur="1.8s" repeatCount="indefinite"/>
              <animate attributeName="cy" values="60;66" dur="1.8s" repeatCount="indefinite"/>
              <animate attributeName="opacity" values="0;0.7;0" dur="1.8s" repeatCount="indefinite"/>
            </circle>
            <circle r="1.5" fill="rgba(255,255,255,0.3)">
              <animate attributeName="cx" values="142;185" dur="1.8s" repeatCount="indefinite" begin="0.4s"/>
              <animate attributeName="cy" values="75;72" dur="1.8s" repeatCount="indefinite" begin="0.4s"/>
              <animate attributeName="opacity" values="0;0.6;0" dur="1.8s" repeatCount="indefinite" begin="0.4s"/>
            </circle>
            <circle r="1.5" fill="rgba(255,255,255,0.3)">
              <animate attributeName="cx" values="142;185" dur="1.8s" repeatCount="indefinite" begin="0.8s"/>
              <animate attributeName="cy" values="84;76" dur="1.8s" repeatCount="indefinite" begin="0.8s"/>
              <animate attributeName="opacity" values="0;0.6;0" dur="1.8s" repeatCount="indefinite" begin="0.8s"/>
            </circle>
            <!-- Right side: Tokenized output (grid of tokens) -->
            <g transform="translate(300,70)">
              <rect x="-42" y="-28" width="84" height="56" rx="6" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
              <text x="0" y="-14" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="8" font-family="Inter" font-weight="700">On-Chain Tokens</text>
              <line x1="-30" y1="-6" x2="30" y2="-6" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
              <!-- Token grid (3x2) -->
              <g>
                <circle cx="-20" cy="4" r="5" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>
                <text x="-20" y="6" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="5" font-weight="700">T1</text>
              </g>
              <g>
                <circle cx="0" cy="4" r="5" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>
                <text x="0" y="6" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="5" font-weight="700">T2</text>
              </g>
              <g>
                <circle cx="20" cy="4" r="5" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>
                <text x="20" y="6" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="5" font-weight="700">T3</text>
              </g>
              <g>
                <circle cx="-20" cy="20" r="5" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>
                <text x="-20" y="22" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="5" font-weight="700">T4</text>
              </g>
              <g>
                <circle cx="0" cy="20" r="5" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>
                <text x="0" y="22" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="5" font-weight="700">T5</text>
              </g>
              <g>
                <circle cx="20" cy="20" r="5" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>
                <text x="20" y="22" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="5" font-weight="700">T6</text>
              </g>
              <!-- Pulsing glow on tokens -->
              <circle cx="-20" cy="4" r="5" fill="none" stroke="rgba(255,255,255,0.15)">
                <animate attributeName="r" values="5;8;5" dur="3s" repeatCount="indefinite"/>
                <animate attributeName="opacity" values="0.3;0;0.3" dur="3s" repeatCount="indefinite"/>
              </circle>
              <circle cx="20" cy="20" r="5" fill="none" stroke="rgba(255,255,255,0.15)">
                <animate attributeName="r" values="5;8;5" dur="3s" repeatCount="indefinite" begin="1s"/>
                <animate attributeName="opacity" values="0.3;0;0.3" dur="3s" repeatCount="indefinite" begin="1s"/>
              </circle>
            </g>
            <!-- Particles flying from center to right -->
            <circle r="2" fill="rgba(255,255,255,0.4)">
              <animate attributeName="cx" values="216;258" dur="1.6s" repeatCount="indefinite" begin="0.3s"/>
              <animate attributeName="cy" values="66;62" dur="1.6s" repeatCount="indefinite" begin="0.3s"/>
              <animate attributeName="opacity" values="0;0.7;0" dur="1.6s" repeatCount="indefinite" begin="0.3s"/>
            </circle>
            <circle r="1.5" fill="rgba(255,255,255,0.3)">
              <animate attributeName="cx" values="216;258" dur="1.6s" repeatCount="indefinite" begin="0.7s"/>
              <animate attributeName="cy" values="72;74" dur="1.6s" repeatCount="indefinite" begin="0.7s"/>
              <animate attributeName="opacity" values="0;0.6;0" dur="1.6s" repeatCount="indefinite" begin="0.7s"/>
            </circle>
            <!-- Labels -->
            <text x="100" y="130" text-anchor="middle" fill="rgba(255,255,255,0.25)" font-size="7" font-family="Inter">Physical</text>
            <text x="200" y="130" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-size="7" font-family="Inter" font-weight="600">Tokenize</text>
            <text x="300" y="130" text-anchor="middle" fill="rgba(255,255,255,0.25)" font-size="7" font-family="Inter">Digital</text>
          </svg>